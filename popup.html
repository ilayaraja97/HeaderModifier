<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Header Modifier</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1>Header Modifier</h1>
    <button type="button" id="btn-add" class="btn btn-primary">+ Add Rule</button>
  </header>

  <main>
    <section id="list-view">
      <ul id="rules-list" class="rules-list"></ul>
      <p id="empty-state" class="empty-state hidden">No rules yet. Add one to inject request headers.</p>
    </section>

    <section id="form-view" class="hidden">
      <h2 id="form-title">Add Rule</h2>
      <form id="rule-form">
        <input type="hidden" id="rule-id">

        <label for="url-pattern">URL Pattern</label>
        <input type="text" id="url-pattern" placeholder="*://api.example.com/*" required>

        <label for="header-name">Header Name</label>
        <div class="header-name-row">
          <select id="header-preset">
            <option value="custom">Custom…</option>
          </select>
          <input type="text" id="header-name" value="Authorization" required>
        </div>

        <label for="header-value">Header Value</label>
        <input type="text" id="header-value" placeholder="co-" required autocomplete="off">

        <label class="toggle-row">
          <input type="checkbox" id="rule-enabled" checked>
          <span>Enabled</span>
        </label>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" id="btn-cancel" class="btn btn-secondary">Cancel</button>
        </div>
      </form>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
